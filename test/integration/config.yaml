# Integration Test Configuration
# Override via environment variables: TEST_BASE_URL, TEST_STACK_NAME, AWS_REGION
# or via CLI options: --base-url, --stack-name

application:
  name: "Zulip"
  # Zulip's home page returns 404 ("No organization found") until a realm is created.
  # We treat 200, 302, and 404 as acceptable for the home page.
  expected_version: "12.0"

aws:
  region: "us-east-1"
  # ${USER} is expanded at fixture time
  stack_name: "oe-patterns-zulip-${USER}"

test:
  timeout: 30
  max_response_time_seconds: 5

urls:
  base_url: "https://zulip-dylan.dev.patterns.ordinaryexperts.com"
